<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0c10">
<title>FindIsaac</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0c10;
  --accent-cyan: #00e5ff;
  --accent-amber: #ffab00;
  --accent-rose: #ff3d71;
  --glass-bg: rgba(10, 12, 16, 0.72);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-primary: #e8eaf0;
  --text-dim: rgba(232, 234, 240, 0.45);
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Libre Caslon Text', Georgia, serif;
  --font-logo: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  height: 100dvh;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
}

/* Camera feed */
#camera-feed {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.35;
}

/* Main canvas overlay */
#render-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* Crosshair */
.crosshair {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
}
.crosshair::before, .crosshair::after {
  content: '';
  position: absolute;
  background: var(--accent-cyan);
  opacity: 0.6;
}
.crosshair::before {
  width: 1px; height: 40px;
  top: -20px; left: 0;
}
.crosshair::after {
  width: 40px; height: 1px;
  top: 0; left: -20px;
}
.crosshair-ring {
  width: 8px; height: 8px;
  border: 1px solid var(--accent-cyan);
  border-radius: 50%;
  position: absolute;
  top: -4px; left: -4px;
  opacity: 0.5;
}

/* HUD overlay */
.hud-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: calc(12px + env(safe-area-inset-top)) 20px 12px;
  background: linear-gradient(to bottom, rgba(10,12,16,0.85) 0%, transparent 100%);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}

.app-title {
  font-family: var(--font-logo);
  font-weight: 900;
  font-size: 20px;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  line-height: 1;
}
.app-subtitle {
  display: none;
}

.hud-stats {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  line-height: 1.6;
}
.hud-stats .val {
  color: var(--accent-cyan);
  font-weight: 500;
}

/* Center target info */
.center-info {
  position: fixed;
  bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
  min-width: 260px;
}
.center-info .target-name {
  font-family: var(--font-body);
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  text-shadow: 0 0 30px rgba(0,229,255,0.3);
  white-space: nowrap;
}
.center-info .target-detail {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-top: 4px;
}
.center-info .target-distance {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent-cyan);
  margin-top: 2px;
}

/* Search bar */
.search-container {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom)); left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  width: min(90vw, 420px);
}
.search-box {
  display: flex;
  align-items: center;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 0 16px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: border-color 0.3s;
}
.search-box:focus-within {
  border-color: rgba(0,229,255,0.3);
}
.search-box svg {
  width: 16px; height: 16px;
  stroke: var(--text-dim);
  flex-shrink: 0;
}
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  padding: 14px 12px;
  letter-spacing: 0.02em;
}
.search-box input::placeholder {
  color: var(--text-dim);
}
.search-results {
  position: absolute;
  bottom: 100%;
  left: 0; right: 0;
  margin-bottom: 8px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  max-height: 240px;
  overflow-y: auto;
  display: none;
}
.search-results.active { display: block; }
.search-result-item {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--glass-border);
  transition: background 0.2s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(0,229,255,0.06); }
.search-result-item .name {
  font-size: 13px;
  color: var(--text-primary);
}
.search-result-item .detail {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Pins panel */
.pins-toggle {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom)); right: 20px;
  z-index: 20;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
}
.pins-toggle:hover {
  border-color: var(--accent-amber);
}
.pins-toggle svg {
  width: 18px; height: 18px;
  stroke: var(--accent-amber);
}
.pin-count {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--accent-amber);
  color: var(--bg-deep);
  font-size: 9px;
  font-weight: 500;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Permission overlay */
.permission-overlay {
  position: fixed; inset: 0;
  z-index: 100;
  background: var(--bg-deep);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.permission-overlay.hidden { display: none; }
.permission-overlay h1 {
  font-family: var(--font-logo);
  font-weight: 900;
  font-size: 52px;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 48px;
}
.start-btn {
  background: var(--accent-cyan);
  border: none;
  color: var(--bg-deep);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 16px 48px;
  border-radius: 999px;
  cursor: pointer;
  transition: box-shadow 0.3s, transform 0.3s;
  position: relative;
  overflow: hidden;
  perspective: 600px;
}
.start-btn:hover {
  box-shadow: 0 0 40px rgba(0,229,255,0.3);
}
.start-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transform: translateX(-100%);
  animation: shimmer 2s infinite;
}
.start-btn.flipping {
  animation: flipY 0.7s ease-in-out;
}
@keyframes shimmer {
  to { transform: translateX(100%); }
}
@keyframes flipY {
  0% { transform: rotateX(0deg); }
  50% { transform: rotateX(180deg); }
  100% { transform: rotateX(360deg); }
}

/* Compass ring */
.compass-ring {
  position: fixed;
  bottom: calc(80px + env(safe-area-inset-bottom)); left: 20px;
  z-index: 15;
  width: 56px; height: 56px;
}
.compass-ring svg {
  width: 100%; height: 100%;
}

/* Desktop simulation controls */
.desktop-controls {
  position: fixed;
  top: 70px; right: 20px;
  z-index: 20;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 14px 16px;
  backdrop-filter: blur(20px);
  font-size: 10px;
  color: var(--text-dim);
  display: none;
  width: 200px;
}
.desktop-controls.show { display: block; }
.desktop-controls label {
  display: block;
  margin-bottom: 8px;
}
.desktop-controls span {
  display: flex;
  justify-content: space-between;
  margin-bottom: 3px;
}
.desktop-controls input[type="range"] {
  width: 100%;
  accent-color: var(--accent-cyan);
}
.desktop-note {
  color: var(--accent-amber);
  font-size: 9px;
  margin-bottom: 10px;
  line-height: 1.4;
}

/* Notification */
.notification {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  z-index: 50;
  background: var(--glass-bg);
  border: 1px solid var(--accent-amber);
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 11px;
  color: var(--accent-amber);
  backdrop-filter: blur(20px);
  opacity: 0;
  transition: all 0.4s;
  pointer-events: none;
  white-space: nowrap;
}
.notification.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Grid lines canvas styling */
.grid-overlay {
  position: fixed; inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="render-canvas"></canvas>

<div class="crosshair">
  <div class="crosshair-ring"></div>
</div>

<!-- HUD -->
<div class="hud-top">
  <div>
    <div class="app-title">FindIsaac</div>
  </div>
  <div class="hud-stats">
    <div>AZI <span class="val" id="hud-azimuth">---°</span></div>
    <div>ALT <span class="val" id="hud-altitude">---°</span></div>
    <div>TGT <span class="val" id="hud-target">---</span></div>
  </div>
</div>

<!-- Center target -->
<div class="center-info">
  <div class="target-name" id="center-target-name">Initializing...</div>
  <div class="target-detail" id="center-target-detail"></div>
  <div class="target-distance" id="center-target-distance"></div>
</div>

<!-- Search -->
<div class="search-container">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search any location..." autocomplete="off">
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<!-- Pins toggle -->
<div class="pins-toggle" id="pins-toggle" title="Pinned locations">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
  <div class="pin-count" id="pin-count" style="display:none">0</div>
</div>

<!-- Compass -->
<div class="compass-ring">

    <circle cx="28" cy="28" r="26" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    </g>
    <text x="28" y="5" text-anchor="middle" fill="var(--accent-rose)" font-size="7" font-family="var(--font-mono)">N</text>
  </svg>
</div>

<!-- Desktop sim controls -->
<div class="desktop-controls" id="desktop-controls">
  <div class="desktop-note">⚡ Desktop mode — use sliders to simulate device orientation</div>
  <label>
    <span>Heading (azimuth) <span class="val" id="sim-az-val">0°</span></span>
    <input type="range" id="sim-azimuth" min="0" max="360" value="0">
  </label>
  <label>
    <span>Tilt (altitude) <span class="val" id="sim-alt-val">-45°</span></span>
    <input type="range" id="sim-altitude" min="-90" max="0" value="-45">
  </label>
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<!-- Permission screen -->
<div class="permission-overlay" id="permission-overlay">
  <h1>FindIsaac</h1>
  <button class="start-btn" id="start-btn">START</button>
</div>

// ---------- MATH UTILS ----------
function toRad(d) { return d * DEG; }
function toDeg(r) { return r * RAD; }

// Compute the lat/lng that you'd see if you drew a line from your position
// through the Earth at a given azimuth and altitude angle.
// altitude: -90 = straight down (antipodal point, 180° away)
//            0  = horizon (0° away, i.e. your own location)
// azimuth: compass bearing
function computeTargetLatLng(userLat, userLng, azimuth, altitude) {
  // Inverse of: alt = -(angDistDeg / 180) * 90
  // So: angDistDeg = -altitude * 2   (altitude=-90 → 180°, altitude=0 → 0°)
  const angularDist = toRad(Math.max(0, -altitude * 2));

  const lat1 = toRad(userLat);
  const lng1 = toRad(userLng);
  const az = toRad(azimuth);

  const lat2 = Math.asin(
    Math.sin(lat1) * Math.cos(angularDist) +
    Math.cos(lat1) * Math.sin(angularDist) * Math.cos(az)
  );
  const lng2 = lng1 + Math.atan2(
    Math.sin(az) * Math.sin(angularDist) * Math.cos(lat1),
    Math.cos(angularDist) - Math.sin(lat1) * Math.sin(lat2)
  );

  return {
    lat: toDeg(lat2),
    lng: ((toDeg(lng2) + 540) % 360) - 180  // normalize to -180..180
  };
}

// Great circle distance in km
function haversine(lat1, lng1, lat2, lng2) {
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return EARTH_R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Compute azimuth and altitude from user to a target location
// Looking DOWN through the Earth:
//   - angular distance 0° (nearby) → altitude 0° (at the horizon)
//   - angular distance 180° (antipodal) → altitude -90° (straight down)
// Azimuth is the surface bearing — when looking down, we keep the same
// compass direction (south on compass = tilt phone south and look down)
function computeAzAlt(userLat, userLng, targetLat, targetLng) {
  const lat1 = toRad(userLat), lng1 = toRad(userLng);
  const lat2 = toRad(targetLat), lng2 = toRad(targetLng);
  const dLng = lng2 - lng1;

  // Azimuth (bearing along surface)
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  let az = toDeg(Math.atan2(y, x));
  az = (az + 360) % 360;

  // Angular distance on the sphere (0 to π radians → 0 to 180°)
  const angDist = Math.acos(
    Math.min(1, Math.max(-1,
      Math.sin(lat1)*Math.sin(lat2) + Math.cos(lat1)*Math.cos(lat2)*Math.cos(dLng)
    ))
  );
  const angDistDeg = toDeg(angDist);

  // Map: 0° angular dist → 0° altitude (horizon)
  //       180° angular dist → -90° altitude (straight down)
  const alt = -(angDistDeg / 180) * 90;

  return { azimuth: az, altitude: alt };
}

// Convert az/alt to screen x/y (normalized -1..1 from center)
function azAltToScreen(az, alt, viewAz, viewAlt, fovH, fovV) {
  // Difference in azimuth (handle wraparound)
  let dAz = az - viewAz;
  if (dAz > 180) dAz -= 360;
  if (dAz < -180) dAz += 360;

  const dAlt = alt - viewAlt;

  const nx = dAz / (fovH / 2);
  const ny = -dAlt / (fovV / 2);  // negative because screen Y is inverted

  return { nx, ny };
}

// ---------- REVERSE GEOCODE (find nearest known location) ----------
function findNearestLocation(lat, lng) {
  let best = null, bestDist = Infinity;
  for (const loc of ALL_LOCATIONS) {
    const d = haversine(lat, lng, loc.lat, loc.lng);
    // Weight by type (countries have larger radius of "ownership")
    const threshold = loc.type === 'country' ? 1500 : loc.type === 'city' ? 200 : 100;
    if (d < threshold && d < bestDist) {
      bestDist = d;
      best = loc;
    }
  }
  // Also check countries more generously as fallback
  if (!best) {
    for (const loc of COUNTRIES) {
      const d = haversine(lat, lng, loc.lat, loc.lng);
      if (d < 3000 && d < bestDist) {
        bestDist = d;
        best = {...loc, type:'country'};
      }
    }
  }
  return best ? { ...best, distance: bestDist } : null;
}

// ---------- CAMERA ----------
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    cameraFeed.srcObject = stream;

}

// ---------- GEOLOCATION ----------
function initGeo() {
  if (navigator.geolocation) {

      pos => {

        state.userLng = pos.coords.longitude;
        showNotif(`Location: ${state.userLat.toFixed(2)}°, ${state.userLng.toFixed(2)}°`);
      },

      { enableHighAccuracy: true }
    );
  }
}

// ---------- DEVICE ORIENTATION ----------
// This must be called from inside a user-gesture (click) handler for iOS
async function initOrientation() {
  showNotif('Requesting sensor access...');
  
  // iOS 13+ requires explicit permission from a user gesture
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const response = await DeviceOrientationEvent.requestPermission();
      if (response === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation, true);
        state.hasGyro = true;
        showNotif('✓ Gyroscope active (iOS)');
        return;
      } else {
        showNotif('Sensor permission denied');
        enableDesktopMode();
        return;
      }
    } catch(err) {
      console.log('iOS permission error:', err);
      showNotif('Sensor permission error');
      enableDesktopMode();
      return;
    }
  }

  // Non-iOS: try listening for events, with fallbacks
  // Try both 'deviceorientation' and 'deviceorientationabsolute'
  let gotEvent = false;

  const activateGyro = (eventName) => {
    gotEvent = true;
    state.hasGyro = true;
    window.removeEventListener('deviceorientation', testHandler);
    window.removeEventListener('deviceorientationabsolute', testAbsHandler);
    window.addEventListener(eventName, handleOrientation, true);
    showNotif(`✓ Gyroscope active`);
  };

  const testHandler = (e) => {
    if (!gotEvent && e.alpha !== null && e.alpha !== undefined) {
      activateGyro('deviceorientation');
    }
  };
  const testAbsHandler = (e) => {
    if (!gotEvent && e.alpha !== null && e.alpha !== undefined) {
      state.useAbsolute = true;
      activateGyro('deviceorientationabsolute');
    }
  };

  window.addEventListener('deviceorientation', testHandler, true);
  window.addEventListener('deviceorientationabsolute', testAbsHandler, true);

  // Wait longer — some devices are slow to fire the first event
  setTimeout(() => {
    if (!gotEvent) {
      window.removeEventListener('deviceorientation', testHandler);
      window.removeEventListener('deviceorientationabsolute', testAbsHandler);
      showNotif('No gyroscope detected — desktop mode');
      enableDesktopMode();
    }
  }, 3000);
}

// Smoothing for orientation values
let smoothAz = 0, smoothAlt = -90;
const SMOOTH = 0.3; // lower = smoother

function handleOrientation(e) {
  if (e.alpha === null && e.beta === null) return;

  const alpha = e.alpha || 0;
  const beta = e.beta || 0;   // -180..180
  const gamma = e.gamma || 0; // -90..90

  // --- COMPASS HEADING ---
  let heading;
  if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
    heading = e.webkitCompassHeading; // iOS: true north heading
  } else if (e.absolute || state.useAbsolute) {
    heading = (360 - alpha) % 360; // absolute orientation
  } else {
    heading = (360 - alpha) % 360; // relative, best we can do
  }

  // --- ALTITUDE (tilt) ---
  // Device orientations when using rear camera pointing down:
  //   Phone upright (screen facing you): beta ≈ 90  → horizon
  //   Phone tilted 45° forward:          beta ≈ 45  → 45° below horizon
  //   Phone flat face-up:                beta ≈ 0   → straight down
  //   Phone flat face-down:              beta ≈ ±180 → straight down (inverted)
  //
  // We want: altitude -90 = straight down, 0 = horizon
  // So: altitude = beta - 90

  let altitude;
  if (beta >= 0 && beta <= 180) {
    altitude = beta - 90; // 0→-90 (flat=down), 90→0 (upright=horizon)
  } else {
    // beta < 0: phone is tilted backwards past vertical
    // Map -180→-90 (face down inverted), -90→0 would be weird
    // Clamp to useful range
    altitude = Math.max(-90, beta - 90);
  }

  // Clamp
  altitude = Math.max(-90, Math.min(0, altitude));

  // Apply heading correction for gamma when phone is tilted
  // When the phone tilts left/right (gamma), it shifts the effective heading
  const gammaCorrection = gamma * Math.cos(beta * DEG) * 0.5;
  heading = (heading + gammaCorrection + 360) % 360;

  // Smooth
  // Handle azimuth wraparound for smoothing
  let dAz = heading - smoothAz;
  if (dAz > 180) dAz -= 360;
  if (dAz < -180) dAz += 360;
  smoothAz = (smoothAz + dAz * SMOOTH + 360) % 360;
  smoothAlt = smoothAlt + (altitude - smoothAlt) * SMOOTH;

  state.azimuth = smoothAz;
  state.altitude = smoothAlt;
}

function enableDesktopMode() {
  state.isDesktop = true;
  desktopControls.classList.add('show');
  showNotif('Desktop mode — use sliders to look around');

  const azSlider = document.getElementById('sim-azimuth');
  const altSlider = document.getElementById('sim-altitude');

  azSlider.addEventListener('input', () => {
    state.azimuth = parseFloat(azSlider.value);
    document.getElementById('sim-az-val').textContent = azSlider.value + '°';
  });
  altSlider.addEventListener('input', () => {
    state.altitude = parseFloat(altSlider.value);
    document.getElementById('sim-alt-val').textContent = altSlider.value + '°';
  });

  // Mouse drag for desktop
  let dragging = false, lastX, lastY;
  canvas.style.pointerEvents = 'auto';
  canvas.addEventListener('mousedown', e => {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    state.azimuth = (state.azimuth - dx * 0.5 + 360) % 360;
    state.altitude = Math.max(-90, Math.min(0, state.altitude + dy * 0.3));
    azSlider.value = state.azimuth;
    altSlider.value = state.altitude;
    document.getElementById('sim-az-val').textContent = Math.round(state.azimuth) + '°';
    document.getElementById('sim-alt-val').textContent = Math.round(state.altitude) + '°';
    lastX = e.clientX;
    lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => dragging = false);

  // Touch drag for mobile fallback
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    state.azimuth = (state.azimuth - dx * 0.5 + 360) % 360;
    state.altitude = Math.max(-90, Math.min(0, state.altitude + dy * 0.3));
    azSlider.value = state.azimuth;
    altSlider.value = state.altitude;
    document.getElementById('sim-az-val').textContent = Math.round(state.azimuth) + '°';
    document.getElementById('sim-alt-val').textContent = Math.round(state.altitude) + '°';
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }, { passive: true });
  canvas.addEventListener('touchend', () => dragging = false, { passive: true });
}

// ---------- SEARCH ----------
function searchLocations(query) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  return ALL_LOCATIONS.filter(loc =>
    loc.name.toLowerCase().includes(q) ||
    (loc.country && loc.country.toLowerCase().includes(q)) ||
    (loc.code && loc.code.toLowerCase() === q)
  ).slice(0, 8);
}

let searchDebounce;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const results = searchLocations(searchInput.value);
    if (results.length && searchInput.value.trim()) {
      searchResults.innerHTML = results.map((r, i) => `
        <div class="search-result-item" data-idx="${i}">
          <div class="name">${r.type === 'landmark' ? '⭐ ' : r.type === 'city' ? '🏙 ' : '🌍 '}${r.name}</div>
          <div class="detail">${r.country || r.code || ''} · ${r.lat.toFixed(2)}°, ${r.lng.toFixed(2)}°</div>
        </div>
      `).join('');
      searchResults.classList.add('active');

      searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
        el.addEventListener('click', () => {
          pinLocation(results[i]);
          searchResults.classList.remove('active');
          searchInput.value = '';
          searchInput.blur();
        });
      });
    } else {
      searchResults.classList.remove('active');
    }
  }, 150);
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('active'), 200);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) {
    const results = searchLocations(searchInput.value);
    if (results.length) searchResults.classList.add('active');
  }
});

// ---------- PINS ----------
function pinLocation(loc) {
  // Check if already pinned
  if (state.pins.find(p => p.name === loc.name)) {
    showNotif(`${loc.name} already pinned`);
    return;
  }
  state.pins.push({
    name: loc.name,
    lat: loc.lat,
    lng: loc.lng,
    type: loc.type,
    country: loc.country || loc.code || '',
    color: `hsl(${Math.random()*360}, 70%, 60%)`,
  });
  updatePinCount();
  showNotif(`📌 Pinned: ${loc.name}`);
}

function updatePinCount() {
  if (state.pins.length > 0) {
    pinCountEl.style.display = 'flex';
    pinCountEl.textContent = state.pins.length;
  } else {
    pinCountEl.style.display = 'none';
  }
}

pinsToggle.addEventListener('click', () => {
  if (state.pins.length === 0) {
    showNotif('No pins yet — search to add one');
    return;
  }
  // Remove last pin (simple toggle behavior)
  const removed = state.pins.pop();
  showNotif(`Removed: ${removed.name}`);
  updatePinCount();
});

// ---------- RENDER ----------
function formatDist(km) {
  if (km < 1) return `${Math.round(km*1000)} m`;
  if (km < 100) return `${km.toFixed(1)} km`;
  return `${Math.round(km).toLocaleString()} km`;
}

function formatCoord(lat, lng) {
  const latDir = lat >= 0 ? 'N' : 'S';
  const lngDir = lng >= 0 ? 'E' : 'W';
  return `${Math.abs(lat).toFixed(2)}°${latDir}  ${Math.abs(lng).toFixed(2)}°${lngDir}`;
}

function render() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  ctx.clearRect(0, 0, W, H);

  // Current view center target
  const centerTarget = computeTargetLatLng(state.userLat, state.userLng, state.azimuth, state.altitude);
  const centerDist = haversine(state.userLat, state.userLng, centerTarget.lat, centerTarget.lng);
  const nearest = findNearestLocation(centerTarget.lat, centerTarget.lng);

  // Update HUD
  document.getElementById('hud-azimuth').textContent = Math.round(state.azimuth) + '°';
  document.getElementById('hud-altitude').textContent = Math.round(state.altitude) + '°';

  if (nearest) {
    document.getElementById('hud-target').textContent = nearest.name;
    document.getElementById('center-target-name').textContent = nearest.name;
    const typeLabel = nearest.type === 'country' ? '🌍 Country' : nearest.type === 'city' ? '🏙 City' : '⭐ Landmark';
    document.getElementById('center-target-detail').textContent =
      `${typeLabel} · ${formatCoord(centerTarget.lat, centerTarget.lng)}`;
    document.getElementById('center-target-distance').textContent =
      `${formatDist(centerDist)} through Earth`;
  } else {
    document.getElementById('hud-target').textContent = '---';
    document.getElementById('center-target-name').textContent = 'Ocean';
    document.getElementById('center-target-detail').textContent = formatCoord(centerTarget.lat, centerTarget.lng);
    document.getElementById('center-target-distance').textContent = formatDist(centerDist);
  }

  // Update compass
  const needle = document.getElementById('compass-needle');
  needle.setAttribute('transform', `rotate(${-state.azimuth}, 28, 28)`);

  // ---------- Draw grid lines (lat/lng) ----------
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 0.5;

  // Draw lat/lng grid every 30 degrees
  for (let lat = -60; lat <= 60; lat += 30) {
    ctx.beginPath();
    let started = false;
    for (let lng = -180; lng <= 180; lng += 5) {
      const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, lat, lng);
      const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
      const sx = W/2 + nx * W/2;
      const sy = H/2 + ny * H/2;
      if (Math.abs(nx) < 1.5 && Math.abs(ny) < 1.5) {
        if (!started) { ctx.moveTo(sx, sy); started = true; }
        else ctx.lineTo(sx, sy);
      } else { started = false; }
    }
    ctx.stroke();
  }
  for (let lng = -180; lng < 180; lng += 30) {
    ctx.beginPath();
    let started = false;
    for (let lat = -80; lat <= 80; lat += 5) {
      const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, lat, lng);
      const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
      const sx = W/2 + nx * W/2;
      const sy = H/2 + ny * H/2;
      if (Math.abs(nx) < 1.5 && Math.abs(ny) < 1.5) {
        if (!started) { ctx.moveTo(sx, sy); started = true; }
        else ctx.lineTo(sx, sy);
      } else { started = false; }
    }
    ctx.stroke();
  }
  ctx.restore();

  // ---------- Draw HORIZON LINE (altitude = 0) ----------
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#e8eaf0';
  ctx.lineWidth = 1;
  // Horizon is where altitude = 0, i.e. all points at angular distance 0 from user
  // In screen space, that's where viewAlt = 0 maps to a horizontal line
  // Since altitude 0 = horizon, compute its screen Y position
  const horizonNy = -(0 - state.altitude) / (state.fovV / 2);
  const horizonSy = H/2 + horizonNy * H/2;
  if (horizonSy > -50 && horizonSy < H + 50) {
    ctx.beginPath();
    ctx.moveTo(0, horizonSy);
    ctx.lineTo(W, horizonSy);
    ctx.stroke();
    // Label
    ctx.globalAlpha = 0.25;
    ctx.font = `9px 'DM Mono', monospace`;
    ctx.fillStyle = '#e8eaf0';
    ctx.textAlign = 'left';
    ctx.fillText('HORIZON', 12, horizonSy - 6);
  }
  ctx.restore();

  // ---------- Draw all locations ----------
  const allVisible = [];

  // Countries
  for (const loc of COUNTRIES) {
    const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, loc.lat, loc.lng);
    const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
    if (Math.abs(nx) < 1.2 && Math.abs(ny) < 1.2) {
      allVisible.push({
        ...loc, type: 'country',
        sx: W/2 + nx * W/2,
        sy: H/2 + ny * H/2,
        dist: haversine(state.userLat, state.userLng, loc.lat, loc.lng),
        screenDist: Math.sqrt(nx*nx + ny*ny)
      });
    }
  }

  // Cities — only key cities shown by default
  for (const loc of CITIES) {
    if (!KEY_CITIES.has(loc.name)) continue;
    const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, loc.lat, loc.lng);
    const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
    if (Math.abs(nx) < 1.2 && Math.abs(ny) < 1.2) {
      allVisible.push({
        ...loc, type: 'city',
        sx: W/2 + nx * W/2,
        sy: H/2 + ny * H/2,
        dist: haversine(state.userLat, state.userLng, loc.lat, loc.lng),
        screenDist: Math.sqrt(nx*nx + ny*ny)
      });
    }
  }

  // Landmarks
  for (const loc of LANDMARKS) {
    const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, loc.lat, loc.lng);
    const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
    if (Math.abs(nx) < 1.2 && Math.abs(ny) < 1.2) {
      allVisible.push({
        ...loc, type: 'landmark',
        sx: W/2 + nx * W/2,
        sy: H/2 + ny * H/2,
        dist: haversine(state.userLat, state.userLng, loc.lat, loc.lng),
        screenDist: Math.sqrt(nx*nx + ny*ny)
      });
    }
  }

  // Draw countries (faded, larger text)
  for (const v of allVisible.filter(v => v.type === 'country')) {
    const alpha = Math.max(0.15, 1 - v.screenDist * 0.8);
    const size = Math.max(8, 14 - v.screenDist * 6);

    ctx.save();
    ctx.globalAlpha = alpha * 0.4;
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath();
    ctx.arc(v.sx, v.sy, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = alpha * 0.6;
    ctx.font = `${size}px 'Libre Caslon Text', Georgia, serif`;
    ctx.fillStyle = '#00e5ff';
    ctx.textAlign = 'center';
    ctx.fillText(v.name.toUpperCase(), v.sx, v.sy - 10);
    ctx.restore();
  }

  // Draw cities (smaller dots)
  for (const v of allVisible.filter(v => v.type === 'city')) {
    const alpha = Math.max(0.1, 1 - v.screenDist * 0.9);
    if (alpha < 0.15) continue;

    ctx.save();
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#e8eaf0';
    ctx.beginPath();
    ctx.arc(v.sx, v.sy, 2, 0, Math.PI * 2);
    ctx.fill();

    if (v.screenDist < 0.6) {
      ctx.globalAlpha = alpha * 0.5;
      ctx.font = `9px 'DM Mono', monospace`;
      ctx.fillStyle = '#e8eaf0';
      ctx.textAlign = 'center';
      ctx.fillText(v.name, v.sx, v.sy - 7);
    }
    ctx.restore();
  }

  // Draw landmarks (star icon)
  for (const v of allVisible.filter(v => v.type === 'landmark')) {
    const alpha = Math.max(0.1, 1 - v.screenDist * 0.8);
    if (alpha < 0.12) continue;

    ctx.save();
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillStyle = '#ffab00';

    // Star shape
    const r = 4;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 72 - 90) * DEG;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](v.sx + Math.cos(angle)*r, v.sy + Math.sin(angle)*r);
      const inner = (i * 72 + 36 - 90) * DEG;
      ctx.lineTo(v.sx + Math.cos(inner)*r*0.4, v.sy + Math.sin(inner)*r*0.4);
    }
    ctx.closePath();
    ctx.fill();

    if (v.screenDist < 0.7) {
      ctx.globalAlpha = alpha * 0.6;
      ctx.font = `9px 'DM Mono', monospace`;
      ctx.fillStyle = '#ffab00';
      ctx.textAlign = 'center';
      ctx.fillText(v.name, v.sx, v.sy - 9);
    }
    ctx.restore();
  }

  // ---------- Draw PINS (always prominent) ----------
  for (const pin of state.pins) {
    const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, pin.lat, pin.lng);
    const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
    const sx = W/2 + nx * W/2;
    const sy = H/2 + ny * H/2;
    const onScreen = Math.abs(nx) < 1.3 && Math.abs(ny) < 1.3;

    if (onScreen) {
      // Pin marker
      ctx.save();
      ctx.shadowColor = pin.color;
      ctx.shadowBlur = 15;

      // Pulsing ring
      const pulse = 1 + 0.2 * Math.sin(Date.now() / 400);
      ctx.strokeStyle = pin.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(sx, sy, 12 * pulse, 0, Math.PI * 2);
      ctx.stroke();

      // Inner dot
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = pin.color;
      ctx.beginPath();
      ctx.arc(sx, sy, 5, 0, Math.PI * 2);
      ctx.fill();

      // Label
      ctx.shadowBlur = 0;
      ctx.font = `bold 11px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = pin.color;
      ctx.fillText(pin.name, sx, sy - 18);

      // Distance
      const d = haversine(state.userLat, state.userLng, pin.lat, pin.lng);
      ctx.font = `9px 'DM Mono', monospace`;
      ctx.globalAlpha = 0.6;
      ctx.fillText(formatDist(d), sx, sy + 24);

      ctx.restore();
    } else {
      // Off-screen indicator (arrow at edge)
      const angle = Math.atan2(ny, nx);
      const edgeX = W/2 + Math.cos(angle) * (W/2 - 40);
      const edgeY = H/2 + Math.sin(angle) * (H/2 - 60);

      ctx.save();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = pin.color;

      // Arrow
      ctx.translate(edgeX, edgeY);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.lineTo(-4, -5);
      ctx.lineTo(-4, 5);
      ctx.closePath();
      ctx.fill();

      // Name
      ctx.rotate(-angle);
      ctx.font = `9px 'DM Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(pin.name, 0, -12);
      ctx.restore();
    }
  }

  // ---------- Equator/Tropics markers ----------
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.setLineDash([4, 8]);
  ctx.strokeStyle = '#ff3d71';
  ctx.lineWidth = 0.8;

  // Equator
  ctx.beginPath();
  let eqStarted = false;
  for (let lng = -180; lng <= 180; lng += 3) {
    const { azimuth: az, altitude: alt } = computeAzAlt(state.userLat, state.userLng, 0, lng);
    const { nx, ny } = azAltToScreen(az, alt, state.azimuth, state.altitude, state.fovH, state.fovV);
    const sx = W/2 + nx * W/2;
    const sy = H/2 + ny * H/2;
    if (Math.abs(nx) < 1.5 && Math.abs(ny) < 1.5) {
      if (!eqStarted) { ctx.moveTo(sx, sy); eqStarted = true; }
      else ctx.lineTo(sx, sy);
    } else { eqStarted = false; }
  }
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  requestAnimationFrame(render);
}

// ---------- START ----------
startBtn.addEventListener('click', async () => {
  // IMPORTANT: initOrientation MUST be called directly inside this click handler
  // for iOS DeviceOrientationEvent.requestPermission() to work.
  // Do NOT await anything before calling it.

  // Start orientation FIRST (needs user gesture context on iOS)
  const orientationPromise = initOrientation();

  // Trigger the 3D flip animation
  startBtn.classList.add('flipping');

  // Wait for flip animation to finish, then hide overlay
  await new Promise(r => setTimeout(r, 700));
  permOverlay.classList.add('hidden');

  await orientationPromise;

  // Then camera and geo (these can be async)
  await initCamera();
  initGeo();

  // Start render loop
  requestAnimationFrame(render);

  // Pre-pin antipodal point after a short delay (wait for geo)
  setTimeout(() => {
    const anti = computeTargetLatLng(state.userLat, state.userLng, 0, -90);
    const nearest = findNearestLocation(anti.lat, anti.lng);
    if (nearest) {
      showNotif(`Your antipodal point is near ${nearest.name}`);
    }
  }, 2000);
});

// Keyboard shortcut: Escape to close search
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchResults.classList.remove('active');
    searchInput.blur();
  }
});
</script>
